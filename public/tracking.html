<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>តាមដានអីវ៉ាន់</title>

<style>

*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#fffdf7;
  color:#15110a;
}

/* HEADER */

.header{
  position:relative;
  padding:18px;
  text-align:center;
  color:#fff7d6;
  background:linear-gradient(135deg,#08070b,#2a210f,#d4af37);
  font-weight:900;
}

.back-btn{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
  color:#fff;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
}

/* BOX */

.box{
  margin:24px 16px;
  padding:18px;
  border:1px solid #eadfbd;
  border-radius:18px;
  background:#fff;
}

input{
  width:100%;
  height:50px;
  padding:0 14px;
  border:1px solid #eadfbd;
  border-radius:12px;
  font-size:15px;
}

button{
  width:100%;
  height:50px;
  margin-top:14px;
  border:0;
  border-radius:12px;
  background:linear-gradient(135deg,#f7d774,#d4af37);
  font-weight:900;
  font-size:16px;
}

/* ORDER */

.order{
  margin-top:18px;
  padding:18px;
  border-radius:18px;
  border:1px solid #eadfbd;
  background:#fffaf0;
}

.order-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.status{
  padding:8px 14px;
  border-radius:30px;
  background:linear-gradient(135deg,#f7d774,#d4af37);
  color:#fff;
  font-size:13px;
  font-weight:bold;
}

/* TRACKING */

.tracking{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.step{
  display:flex;
  gap:12px;
  padding:12px;
  border-radius:14px;
  background:#f5f5f5;
  opacity:0.5;
}

.step.active{
  background:#fff3cd;
  border:1px solid #efd27c;
  opacity:1;
}

.icon{
  width:46px;
  height:46px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f7d774,#d4af37);
  font-size:22px;
}

.step h4{
  margin:0;
  font-size:15px;
}

.step p{
  margin:4px 0 0;
  color:#666;
  font-size:13px;
}

/* ITEM */

.item{
  margin-top:10px;
  color:#5d4a13;
  font-size:14px;
}

.muted{
  color:#7b8794;
}

.total{
  margin-top:14px;
  font-weight:900;
  color:#d99a24;
  font-size:18px;
}

/* UPDATE */

.update-time{
  margin-top:12px;
  font-size:13px;
  color:#777;
}

/* SUPPORT */

.support{
  margin-top:20px;
}

.support-btn{
  display:block;
  width:100%;
  padding:12px;
  margin-top:10px;
  text-align:center;
  text-decoration:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  background:#111;
}

.telegram{
  background:#229ED9;
}
.status{
  padding:8px 14px;
  border-radius:30px;
  color:#fff;
  font-size:13px;
  font-weight:bold;
  display:inline-block;
}

/* Pending */
.status.pending{
  background:#d4af37;
}

/* Processing */
.status.processing{
  background:#ff9800;
}

/* Shipping */
.status.shipping{
  background:#2196f3;
}

/* Delivered */
.status.delivered{
  background:#4caf50;
}

/* Cancel */
.status.cancel{
  background:#f44336;
}
.anime-bike{
  overflow:hidden;
  background:#fff3cd;
}

.anime-bike img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="header">
  <a href="index.html" class="back-btn">←</a>
  តាមដានអីវ៉ាន់
</div>

<div class="box">

  <input
    id="phone"
    inputmode="tel"
    placeholder="បញ្ចូលលេខទូរស័ព្ទដែលបាន order"
  >

  <button type="button" onclick="trackOrder()">
    តាមដាន
  </button>

  <div id="result"></div>

</div>

<script>

function money(value){
  return Number(value || 0).toFixed(2);
}

function productName(item){
  return item.name_kh || item.name_en || item.name || "No name";
}

function getTrackingSteps(status){

  return `
  
  <div class="tracking">

    <div class="step active">
      <div class="icon">📝</div>
      <div>
        <h4>បានទទួល Order</h4>
        <p>Order របស់អ្នកត្រូវបានទទួល</p>
      </div>
    </div>

    <div class="step ${status !== "pending" ? "active" : ""}">
      <div class="icon">📦</div>
      <div>
        <h4>កំពុងរៀបចំ</h4>
        <p>ក្រុមការងារកំពុងរៀបចំអីវ៉ាន់</p>
      </div>
    </div>

    <div class="step ${
      status === "shipping" || status === "delivered"
      ? "active"
      : ""
    }">
      <div class="icon anime-bike">
  <img src="/images/delivery-anime.gif">
</div>
      <div>
        <h4>កំពុងដឹក</h4>
        <p>Driver កំពុងដឹកជញ្ជូន</p>
      </div>
    </div>

    <div class="step ${
      status === "delivered"
      ? "active"
      : ""
    }">
      <div class="icon">🏠</div>
      <div>
        <h4>បានដល់</h4>
        <p>អីវ៉ាន់ដល់អតិថិជន</p>
      </div>
    </div>

  </div>
  
  `;
}

async function trackOrder(){

  const phone = document.getElementById("phone").value.trim();
  const result = document.getElementById("result");

  if(!phone){
    result.innerHTML =
      `<p class="muted">សូមបញ្ចូលលេខទូរស័ព្ទ</p>`;
    return;
  }

  result.innerHTML =
    `<p class="muted">កំពុងស្វែងរក...</p>`;

  try{

    const res = await fetch(
      "/api/orders?phone=" + encodeURIComponent(phone)
    );

    const orders = await res.json();

    if(!res.ok){
      throw new Error(orders.error || "Failed");
    }

    if(!orders.length){

      result.innerHTML =
        `<p class="muted">
          រកមិនឃើញប្រវត្តិ order សម្រាប់លេខនេះ
        </p>`;

      return;
    }

    result.innerHTML = orders.map((order) => {

      const items = (order.cart || []).map((item) => {

        const qty = Number(item.qty || item.quantity || 1);

        const price = Number(item.price || 0);

        const deliveryFee =
          item.deliveryType === "free"
          ? 0
          : Number(
              item.deliveryFee ||
              item.delivery ||
              item.shippingFee ||
              0
            );

        const productTotal = price * qty;

        const itemTotal = productTotal + deliveryFee;

        return `
          <div class="item">
            • ${productName(item)} x ${qty}
            - $${money(productTotal)}
          </div>

          <div class="item muted">
            ដឹកជញ្ជូន: $${money(deliveryFee)}
          </div>

          <div class="item">
            សរុបរង: $${money(itemTotal)}
          </div>
        `;

      }).join("");

      const date = order.createdAt
        ? new Date(order.createdAt).toLocaleString()
        : "-";

      const status = order.status || "pending";

function statusText(status){

  switch(status){

    case "pending":
      return "⏳ កំពុងរង់ចាំ";

    case "processing":
      return "📦 កំពុងរៀបចំ";

    case "shipping":
      return "🚚 កំពុងដឹក";

    case "delivered":
      return "✅ បានដល់";

    case "cancel":
      return "❌ បានបោះបង់";

    default:
      return status;
  }
}

function statusClass(status){

  switch(status){

    case "pending":
      return "pending";

    case "processing":
      return "processing";

    case "shipping":
      return "shipping";

    case "delivered":
      return "delivered";

    case "cancel":
      return "cancel";

    default:
      return "";
  }
}

      const orderTotal = (order.cart || []).reduce((sum, item) => {

        const qty =
          Number(item.qty || item.quantity || 1);

        const price =
          Number(item.price || 0);

        const deliveryFee =
          item.deliveryType === "free"
          ? 0
          : Number(
              item.deliveryFee ||
              item.delivery ||
              item.shippingFee ||
              0
            );

        return sum + (price * qty) + deliveryFee;

      }, 0);

      return `

      <div class="order">

        <div class="order-top">

          <div>
            <strong>Order ID:</strong>
            ${order._id}
          </div>

         <div class="status ${statusClass(status)}">
  ${statusText(status)}
</div>

        </div>

        <div class="update-time">
          🕒 Update:
          ${date}
        </div>

        ${getTrackingSteps(status)}

        ${items}

        <div class="total">
          Total:
          $${money(order.total || orderTotal)}
        </div>

        <div class="support">

          <a
            href="tel:098851885"
            class="support-btn"
          >
            📞 Contact Support
          </a>

          <a
            href="https://t.me/N21twentyone"
            class="support-btn telegram"
          >
            💬 Telegram Support
          </a>

        </div>

      </div>

      `;

    }).join("");

  }catch(err){

    result.innerHTML =
      `<p class="muted">
        មានបញ្ហា សូមព្យាយាមម្ដងទៀត
      </p>`;
  }
}

/* 🔔 Auto Refresh */

setInterval(() => {

  const phone =
    document.getElementById("phone").value.trim();

  if(phone){
    trackOrder();
  }

}, 5000);

</script>

</body>
</html>
