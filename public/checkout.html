<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checkout</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

:root {
  --brand: #d4af37;
  --brand-2: #f7d774;
  --gold-dark: #8a6b16;
  --dark: #08070b;
  --text: #15110a;
  --muted: #7b8794;
  --line: #eadfbd;
  --bg: #f8f5ec;
}

body {
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(212, 175, 55, .18), transparent 260px),
    radial-gradient(circle at top right, rgba(247, 215, 116, .16), transparent 260px),
    linear-gradient(180deg, #fffaf0 0%, #f8f5ec 55%, #fffdf7 100%);
  padding: 22px 12px;
}

.box {
  width: min(100%, 400px);
  margin: 0 auto;
  padding: 20px;
  border: 1px solid rgba(212, 175, 55, .32);
  border-radius: 20px;
  background: rgba(255,253,247,.97);
  box-shadow: 0 18px 42px rgba(17,24,39,.1);
}

.top-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.back-btn {
  width: 38px;
  height: 38px;
  border: 1px solid rgba(212, 175, 55, .32);
  border-radius: 14px;
  color: #08070b;
  background: linear-gradient(135deg, #fffdf7, #f7d774);
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}

h2 {
  color: #08070b;
  font-size: 24px;
  line-height: 1.2;
  font-weight: 900;
}

.field {
  margin-top: 11px;
}

input {
  width: 100%;
  height: 42px;
  padding: 0 12px;
  border: 1px solid #dbe3ee;
  border-radius: 11px;
  outline: none;
  color: var(--text);
  background: #fff;
  font-size: 14px;
}

input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(212,175,55,.14);
}

.error {
  display: block;
  min-height: 16px;
  margin-top: 4px;
  color: #b91c1c;
  font-size: 12px;
}

.total {
  margin-top: 10px;
  color: #08070b;
  text-align: center;
  font-size: 16px;
  font-weight: 900;
}

.total span,
.total strong {
  color: #d99a24;
}

.qr {
  margin-top: 18px;
  text-align: center;
}

.qr p {
  margin-bottom: 8px;
  color: #08070b;
  font-size: 16px;
  font-weight: 900;
}

.qr-frame {
  width: 200px;
  max-width: 78%;
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid rgba(212, 175, 55, .28);
  border-radius: 12px;
  background: #fffdf7;
  box-shadow: 0 10px 24px rgba(17,24,39,.08);
}

.qr img {
  display: block;
  width: 100%;
  height: auto;
}

.upload {
  margin-top: 18px;
  padding: 14px 12px;
  border: 2px dashed #dbe3ee;
  border-radius: 15px;
  color: #08070b;
  background: #fffdf7;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  font-weight: 900;
}

.upload:hover {
  border-color: var(--brand);
  background: #fff9df;
}

#uploadText {
  font-size: 15px;
}

#preview {
  display: none;
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, .24);
}

.confirm {
  width: 100%;
  min-height: 46px;
  padding: 0 14px;
  margin-top: 15px;
  border: 0;
  border-radius: 13px;
  color: #08070b;
  background: linear-gradient(135deg, #f7d774, #d4af37);
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 10px 22px rgba(212,175,55,.28);
}

.confirm:disabled {
  opacity: .7;
  cursor: not-allowed;
}

.confirm:active,
.back-btn:active {
  transform: scale(.97);
}

@media (max-width: 480px) {
  body {
    padding: 12px;
  }

  .box {
    padding: 18px 14px;
    border-radius: 18px;
  }

  h2 {
    font-size: 22px;
  }

  .qr-frame {
    width: 190px;
  }
}
.location-btn {
  width: 100%;
  min-height: 42px;
  margin-top: 8px;
  border: 1px solid rgba(212, 175, 55, .38);
  border-radius: 12px;
  color: #08070b;
  background: linear-gradient(135deg, #fffdf7, #f7d774);
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
}

.location-text {
  display: block;
  margin-top: 5px;
  color: #64748b;
  font-size: 12px;
  line-height: 1.4;
}

</style>
</head>

<body>

<div class="box">
  <div class="top-row">
    <button class="back-btn" onclick="goBack()">←</button>
    <h2 id="pageTitle">Checkout</h2>
  </div>

  <div class="field">
    <input id="customerName" autocomplete="name">
    <small id="nameError" class="error"></small>
  </div>

  <div class="field">
    <input id="phone" inputmode="tel" autocomplete="tel">
    <small id="phoneError" class="error"></small>
  </div>

  <div class="field">
    <input id="address" autocomplete="street-address">
    <small class="error"></small>
  </div>

<button type="button" class="location-btn" onclick="getCurrentLocation()">
  📍 Current Location
</button>
<small id="locationText" class="location-text"></small>

  <div class="total">
    <span id="totalText">Total</span>: $<span id="total">0.00</span>
  </div>

  <div class="qr">
    <p id="qrText">Scan to Pay (ABA)</p>
    <div class="qr-frame">
      <img src="aba.jpg" alt="ABA payment QR">
    </div>
  </div>

  <div class="upload" onclick="document.getElementById('slip').click()">
    <p id="uploadText">Upload Payment Slip</p>
    <small id="slipError" class="error"></small>
    <img id="preview" alt="Payment slip preview">
    <input type="file" id="slip" accept="image/jpeg,image/png,image/jpg" hidden>
  </div>

  <button id="confirmBtn" class="confirm" onclick="confirmOrder()">Confirm Order</button>
</div>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];

const langData = {
  en:{
    title:"Checkout",
    name:"Your Name",
    phone:"Phone Number",
    address:"Address",
    upload:"Upload Payment Slip",
    uploaded:"Uploaded",
    confirm:"Confirm Order",
    processing:"Processing...",
    total:"Total",
    qr:"Scan to Pay (ABA)",
    nameError:"Enter name",
    phoneError:"Enter phone",
    slipError:"Upload slip",
    fileError:"Only JPG / PNG allowed",
    success:"Order success",
    failed:"Order failed"
  },
  kh:{
    title:"បញ្ជាទិញ",
    name:"ឈ្មោះ",
    phone:"លេខទូរស័ព្ទ",
    address:"អាសយដ្ឋាន",
    upload:"បញ្ចូលវិក្កយបត្រ",
    uploaded:"បានបញ្ចូលរួច",
    confirm:"បញ្ជាទិញ",
    processing:"កំពុងដំណើរការ...",
    total:"សរុប",
    qr:"ស្កេនបង់ប្រាក់ (ABA)",
    nameError:"សូមបញ្ចូលឈ្មោះ",
    phoneError:"សូមបញ្ចូលលេខទូរស័ព្ទ",
    slipError:"សូមបញ្ចូលវិក្កយបត្រ",
    fileError:"អាចប្រើបានតែ JPG / PNG",
    success:"បញ្ជាទិញបានជោគជ័យ",
    failed:"បញ្ជាទិញមិនបានជោគជ័យ"
  }
};

function currentLang(){
  return localStorage.getItem("lang") || "en";
}

function text(){
  return langData[currentLang()] || langData.en;
}

function money(value){
  return Number(value || 0).toFixed(2);
}

function getQty(item){
  return Math.max(1, Number(item.qty || item.quantity || 1));
}

function getDeliveryFee(item){
  if(item.deliveryType === "free") return 0;
  return Number(item.deliveryFee || 0);
}

function getItemTotal(item){
  return Number(item.price || 0) * getQty(item) + getDeliveryFee(item);
}

function buildCheckoutCart(){
  return cart.map((item)=>{
    const price = Number(item.price || 0);
    const qty = getQty(item);
    const deliveryFee = getDeliveryFee(item);
    const subtotal = price * qty;
    const itemTotal = subtotal + deliveryFee;

    return {
      ...item,
      qty,
      deliveryFee,
      subtotal,
      itemTotal
    };
  });
}

function getOrderTotal(items){
  return items.reduce((sum,item)=>sum + Number(item.itemTotal || 0),0);
}

function updateTotal(){
  const checkoutCart = buildCheckoutCart();
  const total = getOrderTotal(checkoutCart);
  document.getElementById("total").innerText = money(total);
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href = "cart.html";
  }
}
let currentLocationUrl = "";

function getCurrentLocation(){
  const locationText = document.getElementById("locationText");

  if(!navigator.geolocation){
    locationText.innerText = "Location not supported";
    return;
  }

  locationText.innerText = "Getting location...";

  navigator.geolocation.getCurrentPosition(
    (position)=>{
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      currentLocationUrl = `https://www.google.com/maps?q=${lat},${lng}`;
      locationText.innerText = "Location added";
    },
    ()=>{
      locationText.innerText = "Please allow location permission";
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

document.getElementById("slip").onchange = () => {
  const slip = document.getElementById("slip");
  const file = slip.files[0];
  const t = text();

  if(!file) return;

  const allowed = ["image/jpeg","image/png","image/jpg"];
  if(!allowed.includes(file.type)){
    alert(t.fileError);
    slip.value = "";
    return;
  }

  document.getElementById("uploadText").innerText = t.uploaded;
  document.getElementById("slipError").innerText = "";
  document.getElementById("preview").src = URL.createObjectURL(file);
  document.getElementById("preview").style.display = "block";
};

async function confirmOrder(){
  const t = text();
  const btn = document.getElementById("confirmBtn");
  const nameInput = document.getElementById("customerName");
  const phoneInput = document.getElementById("phone");
  const addressInput = document.getElementById("address");
  const slipInput = document.getElementById("slip");

  document.getElementById("nameError").innerText = "";
  document.getElementById("phoneError").innerText = "";
  document.getElementById("slipError").innerText = "";

  let valid = true;

  if(!nameInput.value.trim()){
    document.getElementById("nameError").innerText = t.nameError;
    valid = false;
  }

  if(!phoneInput.value.trim()){
    document.getElementById("phoneError").innerText = t.phoneError;
    valid = false;
  }

  if(!slipInput.files[0]){
    document.getElementById("slipError").innerText = t.slipError;
    valid = false;
  }

  if(!valid) return;

  btn.innerText = t.processing;
  btn.disabled = true;

  const checkoutCart = buildCheckoutCart();
  const orderTotal = getOrderTotal(checkoutCart);

  const form = new FormData();
  form.append("name", nameInput.value.trim());
  form.append("phone", phoneInput.value.trim());
  form.append("address", addressInput.value.trim());
  form.append("location", currentLocationUrl || addressInput.value.trim());
  form.append("cart", JSON.stringify(checkoutCart));
  form.append("total", money(orderTotal));
  form.append("slip", slipInput.files[0]);

  try{
    const res = await fetch("/api/order",{
      method:"POST",
      body:form
    });

    if(!res.ok) throw new Error("Order failed");

    alert(t.success);
    localStorage.removeItem("cart");
    location.href = "index.html";
  }catch(err){
    alert(t.failed);
    btn.innerText = t.confirm;
    btn.disabled = false;
  }
}

function applyLang(){
  const t = text();

  document.title = t.title;
  document.getElementById("pageTitle").innerText = t.title;
  document.getElementById("customerName").placeholder = t.name;
  document.getElementById("phone").placeholder = t.phone;
  document.getElementById("address").placeholder = t.address;
  document.getElementById("uploadText").innerText = t.upload;
  document.getElementById("confirmBtn").innerText = t.confirm;
  document.getElementById("totalText").innerText = t.total;
  document.getElementById("qrText").innerText = t.qr;
}

applyLang();
updateTotal();
</script>

</body>
</html>
